networks:
  medipay_net:
    driver: bridge

services:
  dev-db:
    image: postgres:17
    container_name: res-medipay_dev
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: dev-root
      POSTGRES_DB: dev_medipay_db
    ports:
      - "5404:5432"
    networks:
      - medipay_net

  prod-db:
    image: postgres:17
    container_name: res-medipay_prod
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: prod_medipay_db
    ports:
      - "5405:5432"
    networks:
      - medipay_net

  adminer:
    image: adminer
    container_name: adminer_medipay
    restart: always
    ports:
      - "8009:8080"
    environment:
      ADMINER_DEFAULT_SERVER: dev-db
    networks:
      - medipay_net
